<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>লগইন - Skills BD Academy</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-page">
  <!-- LEFT SIDE -->
  <div class="auth-left">
    <div class="auth-left-content">
      <a href="index.html" class="auth-brand">
        <span>🎓</span>
        <span>Skills BD <strong>Academy</strong></span>
      </a>
      <h2>আবার স্বাগতম!</h2>
      <p>আপনার অ্যাকাউন্টে লগইন করুন এবং শেখা চালিয়ে যান।</p>
      <div class="auth-features">
        <div class="auth-feature">
          <i class="fas fa-video"></i>
          <span>রেকর্ড কোর্স দেখুন</span>
        </div>
        <div class="auth-feature">
          <i class="fas fa-download"></i>
          <span>রিসোর্স ডাউনলোড করুন</span>
        </div>
        <div class="auth-feature">
          <i class="fas fa-chart-line"></i>
          <span>প্রগ্রেস ট্র্যাক করুন</span>
        </div>
        <div class="auth-feature">
          <i class="fas fa-certificate"></i>
          <span>সার্টিফিকেট পান</span>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="auth-right">
    <div class="auth-form-box">
      <h1>লগইন করুন</h1>
      <p class="auth-subtitle">আপনার ইমেইল ও পাসওয়ার্ড দিন</p>

      <div id="alertBox"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>ইমেইল ঠিকানা</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="email"
              placeholder="আপনার ইমেইল লিখুন"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label>পাসওয়ার্ড</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="password"
              placeholder="আপনার পাসওয়ার্ড লিখুন"
              required
            >
            <button type="button" class="toggle-password" onclick="togglePassword('password')">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
          <i class="fas fa-sign-in-alt"></i> লগইন করুন
        </button>
      </form>

      <div class="auth-divider">
        <span>অথবা</span>
      </div>

      <p class="auth-switch">
        অ্যাকাউন্ট নেই?
        <a href="register.html">এখানে রেজিস্ট্রেশন করুন</a>
      </p>

      <a href="index.html" class="back-home">
        <i class="fas fa-arrow-left"></i> হোমপেজে ফিরে যান
      </a>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
  // আগে লগইন থাকলে redirect
  const existingUser = getUser();
  if (existingUser) {
    if (existingUser.role === 'admin') {
      window.location.href = '/admin/index.html';
    } else {
      window.location.href = '/dashboard.html';
    }
  }

  // Password toggle
  const togglePassword = (fieldId, iconId) => {
    const field = document.getElementById(fieldId);
    const icon = document.getElementById(iconId || 'eyeIcon');
    if (field.type === 'password') {
      field.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      field.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  };

  // Login Form
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');

    if (!email || !password) {
      showAlert('ইমেইল ও পাসওয়ার্ড দিন', 'error');
      return;
    }

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> লগইন হচ্ছে...';
    btn.disabled = true;

    const data = await apiCall('/auth/login', 'POST', { email, password });

    if (data.success) {
      saveAuth(data.token, data.user);
      showAlert('লগইন সফল!', 'success');
      setTimeout(() => {
        if (data.user.role === 'admin') {
          window.location.href = '/admin/index.html';
        } else {
          window.location.href = '/dashboard.html';
        }
      }, 1000);
    } else {
      showAlert(data.message || 'লগইন ব্যর্থ হয়েছে', 'error');
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> লগইন করুন';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
