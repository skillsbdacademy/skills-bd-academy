<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>রেজিস্ট্রেশন - Skills BD Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<div class="auth-page">
  <!-- LEFT SIDE -->
  <div class="auth-left">
    <div class="auth-left-content">
      <a href="index.html" class="auth-brand">
        <span>🎓</span>
        <span>Skills BD <strong>Academy</strong></span>
      </a>
      <h2>শেখা শুরু করুন আজই!</h2>
      <p>বিনামূল্যে অ্যাকাউন্ট তৈরি করুন এবং হাজারো শিক্ষার্থীর সাথে যোগ দিন।</p>
      <div class="auth-features">
        <div class="auth-feature">
          <i class="fas fa-gift"></i>
          <span>ফ্রি কোর্স অ্যাক্সেস</span>
        </div>
        <div class="auth-feature">
          <i class="fas fa-users"></i>
          <span>কমিউনিটিতে যোগ দিন</span>
        </div>
        <div class="auth-feature">
          <i class="fas fa-book-open"></i>
          <span>লার্নিং ড্যাশবোর্ড</span>
        </div>
        <div class="auth-feature">
          <i class="fas fa-headset"></i>
          <span>সাপোর্ট পান</span>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="auth-right">
    <div class="auth-form-box">
      <h1>অ্যাকাউন্ট তৈরি করুন</h1>
      <p class="auth-subtitle">নিচের তথ্যগুলো পূরণ করুন</p>

      <div id="alertBox"></div>

      <form id="registerForm">
        <div class="form-group">
          <label>পূর্ণ নাম</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input
              type="text"
              id="name"
              placeholder="আপনার পূর্ণ নাম লিখুন"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label>ইমেইল ঠিকানা</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="email"
              placeholder="আপনার ইমেইল লিখুন"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label>মোবাইল নম্বর</label>
          <div class="input-wrapper">
            <i class="fas fa-phone"></i>
            <input
              type="tel"
              id="phone"
              placeholder="01XXXXXXXXX"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label>পাসওয়ার্ড</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="password"
              placeholder="কমপক্ষে ৬ অক্ষর"
              required
              minlength="6"
            >
            <button type="button" class="toggle-password" onclick="togglePassword('password', 'eye1')">
              <i class="fas fa-eye" id="eye1"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>পাসওয়ার্ড নিশ্চিত করুন</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="confirmPassword"
              placeholder="পাসওয়ার্ড আবার লিখুন"
              required
            >
            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', 'eye2')">
              <i class="fas fa-eye" id="eye2"></i>
            </button>
          </div>
        </div>

        <div class="form-check">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            আমি <a href="#">শর্তাবলী</a> এবং <a href="#">গোপনীয়তা নীতি</a> মেনে নিচ্ছি
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
          <i class="fas fa-user-plus"></i> রেজিস্ট্রেশন করুন
        </button>
      </form>

      <p class="auth-switch">
        আগে থেকে অ্যাকাউন্ট আছে?
        <a href="login.html">এখানে লগইন করুন</a>
      </p>

      <a href="index.html" class="back-home">
        <i class="fas fa-arrow-left"></i> হোমপেজে ফিরে যান
      </a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="/js/auth.js"></script>
<script>
  // আগে লগইন থাকলে redirect
  if (getUser()) {
    window.location.href = 'dashboard.html';
  }

  // Password toggle
  const togglePassword = (fieldId, iconId) => {
    const field = document.getElementById(fieldId);
    const icon = document.getElementById(iconId);
    if (field.type === 'password') {
      field.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      field.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  };

  // Register Form Submit
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('submitBtn');

    // পাসওয়ার্ড মিলছে কিনা চেক
    if (password !== confirmPassword) {
      showAlert('পাসওয়ার্ড দুটো মিলছে না', 'error');
      return;
    }

    // ফোন নম্বর চেক
    if (phone.length < 11) {
      showAlert('সঠিক মোবাইল নম্বর দিন', 'error');
      return;
    }

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> রেজিস্ট্রেশন হচ্ছে...';
    btn.disabled = true;

    try {
      const data = await apiCall('/auth/register', 'POST', {
        name, email, phone, password
      });

      if (data.success) {
        saveAuth(data.token, data.user);
        showAlert('রেজিস্ট্রেশন সফল! ড্যাশবোর্ডে যাচ্ছেন...', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } else {
        showAlert(data.message || 'রেজিস্ট্রেশন ব্যর্থ হয়েছে', 'error');
        btn.innerHTML = '<i class="fas fa-user-plus"></i> রেজিস্ট্রেশন করুন';
        btn.disabled = false;
      }
    } catch (err) {
      showAlert('সার্ভারে সমস্যা হচ্ছে', 'error');
      btn.innerHTML = '<i class="fas fa-user-plus"></i> রেজিস্ট্রেশন করুন';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
