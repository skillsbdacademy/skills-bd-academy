<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>কোর্স বিবরণ - Skills BD Academy</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="container">
    <a href="/index.html" class="nav-brand">
      <span class="brand-icon">🎓</span>
      <span class="brand-text">Skills BD <span class="brand-highlight">Academy</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/index.html">হোম</a></li>
      <li><a href="/courses.html">কোর্সসমূহ</a></li>
      <li><a href="/free-classes.html">ফ্রি ক্লাস</a></li>
    </ul>
    <div class="nav-actions">
      <a href="/login.html" class="btn btn-outline" id="loginBtn">লগইন</a>
      <a href="/register.html" class="btn btn-primary" id="registerBtn">রেজিস্ট্রেশন</a>
      <div class="user-menu" id="userMenu" style="display:none">
        <div class="user-avatar-box" id="userAvatarBox">
          <div class="user-avatar-text" id="userAvatarText">অ</div>
          <i class="fas fa-chevron-down" style="font-size:11px"></i>
        </div>
        <div class="dropdown" id="dropdown">
          <p id="userName"></p>
          <a href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> ড্যাশবোর্ড</a>
          <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> লগআউট</a>
        </div>
      </div>
    </div>
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
  </div>
</nav>

<div id="courseContent" style="padding-top:70px">
  <div style="text-align:center;padding:100px 20px">
    <i class="fas fa-spinner fa-spin" style="font-size:40px;color:var(--primary)"></i>
    <p style="margin-top:16px;color:var(--gray-400)">লোড হচ্ছে...</p>
  </div>
</div>

<style>
.course-hero {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: white;
  padding: 60px 0;
}
.course-hero-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 48px;
  align-items: start;
}
.course-hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(22,163,74,0.2);
  color: #4ade80;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 16px;
  border: 1px solid rgba(22,163,74,0.3);
}
.course-hero h1 {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 16px;
  line-height: 1.3;
}
.course-hero p {
  font-size: 16px;
  opacity: 0.8;
  margin-bottom: 24px;
  line-height: 1.8;
}
.course-meta-row {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  font-size: 14px;
  opacity: 0.8;
}
.course-meta-row span {
  display: flex;
  align-items: center;
  gap: 6px;
}
.buy-card {
  background: white;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-xl);
  position: sticky;
  top: 90px;
}
.buy-card-thumb {
  height: 200px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
}
.buy-card-body {
  padding: 24px;
}
.buy-price {
  font-size: 36px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 20px;
}
.buy-features {
  margin-bottom: 24px;
}
.buy-feature {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--gray-600);
  margin-bottom: 10px;
}
.buy-feature i {
  color: var(--primary);
  width: 16px;
}
.course-body-section {
  padding: 60px 0;
  background: var(--gray-50);
}
.course-body-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 48px;
}
.curriculum-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: white;
  border-radius: 10px;
  margin-bottom: 10px;
  border: 1px solid var(--gray-200);
  transition: var(--transition);
}
.curriculum-item:hover {
  border-color: var(--primary-light);
  box-shadow: var(--shadow-sm);
}
.curriculum-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}
.curriculum-info h4 {
  font-size: 15px;
  font-weight: 600;
  color: var(--gray-800);
}
.curriculum-info p {
  font-size: 13px;
  color: var(--gray-400);
  margin-top: 2px;
}
.locked-overlay {
  margin-left: auto;
  color: var(--gray-300);
  font-size: 16px;
}
@media (max-width: 768px) {
  .course-hero-grid,
  .course-body-grid { grid-template-columns: 1fr; }
  .buy-card { position: static; }
  .course-hero h1 { font-size: 26px; }
}
</style>

<script src="/js/auth.js"></script>
<script>
const courseId = new URLSearchParams(window.location.search).get('id');

if (!courseId) window.location.href = '/courses.html';

const loadCourse = async () => {
  const data = await apiCall(`/courses/${courseId}`);
  if (!data.success) {
    window.location.href = '/courses.html';
    return;
  }

  const c = data.course;
  const user = getUser();
  document.title = `${c.title} - Skills BD Academy`;

  const isFree = c.type === 'free';
  const isEnrolled = user && c.enrolledCheck;

  document.getElementById('courseContent').innerHTML = `
    <!-- HERO -->
    <div class="course-hero">
      <div class="container">
        <div class="course-hero-grid">
          <div>
            <span class="course-hero-badge">
              ${c.type === 'recorded' ? '📹 রেকর্ড কোর্স'
                : c.type === 'live' ? '🔴 লাইভ কোর্স'
                : '✨ ফ্রি কোর্স'}
            </span>
            <h1>${c.title}</h1>
            <p>${c.description}</p>
            <div class="course-meta-row">
              <span><i class="fas fa-users"></i> ${c.totalEnrolled} জন শিক্ষার্থী</span>
              <span><i class="fas fa-video"></i> ${c.lessons?.length || 0} টি ক্লাস</span>
              <span><i class="fas fa-tag"></i> ${c.category || 'General'}</span>
              <span><i class="fas fa-chalkboard-teacher"></i> ${c.instructor}</span>
            </div>
          </div>

          <!-- BUY CARD -->
          <div class="buy-card">
            <div class="buy-card-thumb">🎓</div>
            <div class="buy-card-body">
              <div class="buy-price">
                ${c.price === 0 ? '✨ সম্পূর্ণ ফ্রি' : '৳' + c.price}
              </div>
              <div class="buy-features">
                <div class="buy-feature">
                  <i class="fas fa-infinity"></i> লাইফটাইম অ্যাক্সেস
                </div>
                <div class="buy-feature">
                  <i class="fas fa-video"></i> ${c.lessons?.length || 0} টি ভিডিও ক্লাস
                </div>
                <div class="buy-feature">
                  <i class="fas fa-download"></i> রিসোর্স ফাইল ডাউনলোড
                </div>
                <div class="buy-feature">
                  <i class="fas fa-certificate"></i> সার্টিফিকেট
                </div>
                ${c.type === 'live' ? `
                <div class="buy-feature">
                  <i class="fab fa-whatsapp"></i> WhatsApp গ্রুপ অ্যাক্সেস
                </div>` : ''}
              </div>
              <div id="buyAction"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div class="course-body-section">
      <div class="container">
        <div class="course-body-grid">
          <div>
            <!-- CURRICULUM -->
            <div style="background:white;border-radius:var(--radius);padding:28px;margin-bottom:24px;border:1px solid var(--gray-200)">
              <h2 style="font-size:22px;font-weight:700;color:var(--gray-900);margin-bottom:20px">
                <i class="fas fa-list" style="color:var(--primary)"></i> কোর্সের বিষয়সূচি
              </h2>
              ${c.lessons?.length > 0
                ? c.lessons.sort((a,b) => a.order - b.order).map((l, i) => `
                  <div class="curriculum-item">
                    <div class="curriculum-num">${i+1}</div>
                    <div class="curriculum-info">
                      <h4>${l.title}</h4>
                      <p>${l.duration || ''} ${l.description ? '• ' + l.description : ''}</p>
                    </div>
                    <div class="locked-overlay">
                      ${i === 0 || isFree
                        ? '<i class="fas fa-play-circle" style="color:var(--primary)"></i>'
                        : '<i class="fas fa-lock"></i>'}
                    </div>
                  </div>`).join('')
                : '<p style="color:var(--gray-400);text-align:center;padding:20px">ক্লাস যোগ করা হচ্ছে...</p>'}
            </div>
          </div>

          <!-- SIDE INFO -->
          <div>
            <div style="background:white;border-radius:var(--radius);padding:24px;border:1px solid var(--gray-200)">
              <h3 style="font-size:18px;font-weight:700;margin-bottom:16px">এই কোর্সে যা শিখবেন</h3>
              <p style="font-size:14px;color:var(--gray-600);line-height:1.8">${c.description}</p>

              ${c.type === 'live' && c.whatsappLink ? `
              <div style="margin-top:20px;padding:16px;background:#f0fdf4;border-radius:10px;border:1px solid #bbf7d0">
                <p style="font-size:14px;font-weight:600;color:var(--primary);margin-bottom:8px">
                  <i class="fab fa-whatsapp"></i> লাইভ ক্লাস গ্রুপ
                </p>
                <p style="font-size:13px;color:var(--gray-600)">
                  পেমেন্ট অনুমোদনের পর WhatsApp গ্রুপ লিংক পাবেন।
                </p>
              </div>` : ''}
            </div>
          </div>
        </div>
      </div>
    </div>`;

  // Buy Action button
  renderBuyAction(c);
};

const renderBuyAction = (c) => {
  const user = getUser();
  const buyAction = document.getElementById('buyAction');

  if (c.type === 'free') {
    buyAction.innerHTML = `
      <a href="/learn.html?id=${c._id}" class="btn btn-primary btn-full btn-lg">
        <i class="fas fa-play"></i> এখনই শুরু করুন
      </a>`;
    return;
  }

  if (!user) {
    buyAction.innerHTML = `
      <a href="/login.html" class="btn btn-primary btn-full btn-lg">
        <i class="fas fa-sign-in-alt"></i> লগইন করে কিনুন
      </a>
      <p style="text-align:center;margin-top:12px;font-size:13px;color:var(--gray-400)">
        অ্যাকাউন্ট নেই? <a href="/register.html" style="color:var(--primary)">রেজিস্ট্রেশন করুন</a>
      </p>`;
    return;
  }

  buyAction.innerHTML = `
    <a href="/payment.html?id=${c._id}" class="btn btn-primary btn-full btn-lg">
      <i class="fas fa-shopping-cart"></i> এখনই কিনুন - ৳${c.price}
    </a>
    <p style="text-align:center;margin-top:12px;font-size:12px;color:var(--gray-400)">
      <i class="fas fa-shield-alt"></i> bKash / Nagad এ পেমেন্ট করুন
    </p>`;
};

loadCourse();

window.addEventListener('scroll', () => {
  if (window.scrollY > 20) document.getElementById('navbar').classList.add('scrolled');
  else document.getElementById('navbar').classList.remove('scrolled');
});
</script>
</body>
</html>
